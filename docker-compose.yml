services:
  db:
    image: postgres:16-alpine
    container_name: smart-ai-crm-db
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-smart_ai_crm}
      POSTGRES_USER: ${POSTGRES_USER:-smart_ai_crm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-smart_ai_crm}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-smart_ai_crm} -d ${POSTGRES_DB:-smart_ai_crm}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: smart-ai-crm-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_HOST: db
    command: python manage.py runserver 0.0.0.0:8000
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app/backend
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: smart-ai-crm-frontend
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app/frontend
      - frontend_node_modules:/app/frontend/node_modules
    depends_on:
      - backend

volumes:
  postgres_data:
  frontend_node_modules:
